<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificação Humana</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    width:380px;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
    font-size:24px;
    margin-bottom:10px;
    color:#222;
}

p{
    color:#666;
    margin-bottom:25px;
}

.verify{
    display:flex;
    align-items:center;
    gap:15px;
    padding:18px;
    border:2px solid #d9d9d9;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
}

.verify:hover{
    border-color:#4285f4;
}

.checkbox{
    width:30px;
    height:30px;
    border:2px solid #999;
    border-radius:6px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    color:#fff;
}

.checked{
    background:#22c55e;
    border-color:#22c55e;
}

.loading{
    display:none;
    text-align:center;
    margin-top:20px;
}

.spinner{
    width:24px;
    height:24px;
    margin:0 auto 10px;
    border:3px solid #dbeafe;
    border-top:3px solid #2563eb;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#999;
    font-size:12px;
}
</style>
</head>
<body>

<div class="container">

    <h1>Verificação necessária</h1>

    <p>Confirme que você é humano para continuar.</p>

    <div class="verify" onclick="verificar()">
        <div class="checkbox" id="check"></div>
        <span>Não sou um robô</span>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        Verificando...
    </div>

    <div class="footer">
        Sistema de proteção automatizada
    </div>

</div>

<script>
function verificar(){

    const check = document.getElementById("check");
    const loading = document.getElementById("loading");

    check.innerHTML = "✓";
    check.classList.add("checked");

    loading.style.display = "block";

    setTimeout(() => {

        // ALTERE A URL ABAIXO
        window.location.href = "https://detran.es.gov.br";

    }, 2500);
}
</script>

</body>
</html>
