<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slyce Artigos Esportivos</title>
    
    <style>
        /* Tela de bloqueio/verificação */
        #securityOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0B1121 0%, #1A2A3A 100%);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }
        
        #securityOverlay.hide {
            display: none;
        }
        
        .lock-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,94,20,0.2);
            border-top-color: #FF5E14;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .lock-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .lock-text {
            font-size: 0.85rem;
            color: #94A3B8;
        }
        
        .lock-button {
            margin-top: 20px;
            background: #FF5E14;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .lock-button:hover {
            background: #E64A00;
        }
    </style>
</head>
<body>

<!-- TELA DE VERIFICAÇÃO DE SEGURANÇA (BLOQUEIA O SITE SE NÃO VERIFICADO) -->
<div id="securityOverlay">
    <div class="lock-spinner"></div>
    <div class="lock-title">🔒 Verificando Segurança</div>
    <div class="lock-text">Protegendo contra bots e acessos não autorizados...</div>
    <button id="goToVerifyBtn" class="lock-button">Ir para verificação →</button>
</div>

<!-- TODO O RESTO DO SEU SITE AQUI (TODO CONTEÚDO ORIGINAL) -->

<script>
    // Verifica se o usuário passou pela página de verificação
    const isVerified = sessionStorage.getItem('slyce_recaptcha_verified');
    const verifyTime = sessionStorage.getItem('slyce_recaptcha_time');
    const overlay = document.getElementById('securityOverlay');
    
    function redirectToVerify() {
        window.location.href = 'verify.html';
    }
    
    document.getElementById('goToVerifyBtn').addEventListener('click', redirectToVerify);
    
    if (isVerified === 'true' && verifyTime) {
        const timePassed = Date.now() - parseInt(verifyTime);
        // Verificação válida por 2 horas (7200000 ms)
        if (timePassed < 7200000) {
            // Usuário verificado, libera o site
            overlay.classList.add('hide');
        } else {
            // Verificação expirada, vai para página de verificação
            sessionStorage.removeItem('slyce_recaptcha_verified');
            sessionStorage.removeItem('slyce_recaptcha_time');
            redirectToVerify();
        }
    } else {
        // Não verificou ainda, redireciona para a página de verificação
        redirectToVerify();
    }
</script>

<!-- RESTANTE DO SEU CONTEÚDO ORIGINAL DO SITE AQUI -->

</body>
</html>
